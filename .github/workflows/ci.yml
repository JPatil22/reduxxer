name: CI

on:
  push:
    branches: ['**']
  pull_request:

# A newer push to the same branch cancels the older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # The Python indexer shells out to `python3`/`python` to parse .py files,
      # so the runner needs an interpreter for those tests to exercise the real
      # path instead of silently skipping.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # bash on every OS (Git Bash on Windows) so the test script's shell glob
      # expands identically — PowerShell would pass `dist/test/*.test.js`
      # through literally, and this Node version does not expand it itself.
      - name: Install
        shell: bash
        run: npm ci

      - name: Build
        shell: bash
        run: npm run build

      - name: Test
        shell: bash
        run: npm test

  quality-gate:
    name: retrieval quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        shell: bash
        run: npm ci

      - name: Build
        shell: bash
        run: npm run build

      # Retrieval quality IS the product. This fails the build if recall drops
      # below the floor or the relevance gate starts answering questions the
      # repo has no answer for. Downloads a ~90MB embedding model on first run.
      - name: Retrieval eval (regression gate)
        shell: bash
        env:
          EVAL_MIN_RECALL: '0.70'
        run: npm run eval
